name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pip chillkit 2>/dev/null || pip install release-it 2>/dev/null || true

      - name: Create changelog
        run: |
          version=${GITHUB_REF#refs/tags/}
          date=$(date +%Y-%m-%d)
          changelog_entry="## [$version] - $date\n\n### Features\n\n### Bug Fixes\n\n### Other\n"
          if [ -f CHANGELOG.md ]; then
            echo -e "$changelog_entry" | cat - CHANGELOG.md > /tmp/changelog_new.md
            mv /tmp/changelog_new.md CHANGELOG.md
          else
            echo -e "# Changelog\n$changelog_entry" > CHANGELOG.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          changelog_file: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG for ${{ github.ref_name }}" || true
          git push || true
